{% load static %}<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Questionario Commercianti{% endblock %}</title>
  <link rel="icon" href="{% static 'favicon.ico' %}" sizes="48x48 32x32 16x16">
  <link rel="icon" type="image/svg+xml" href="{% static 'images/FUTURO_INSIEME_logo.svg' %}">
  <script src="https://unpkg.com/htmx.org@2.0.3" integrity="sha384-0895/pl2MU10Hqc6jd4RvrthNlDiE9U1tWmX7WRESftEDLB8akurANBDKfFGsE" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f0;
      color: #2a2a2a;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    /* Header */
    .survey-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .survey-logo {
      width: 110px;
      height: 110px;
      margin-bottom: .5rem;
    }
    .survey-gruppo {
      font-size: .85rem;
      font-weight: 600;
      letter-spacing: .03em;
      color: #4a7c59;
      margin-bottom: 1rem;
    }
    .survey-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: .35rem;
    }
    .survey-header .subtitle {
      color: #666;
      font-size: .95rem;
    }
    .survey-intro {
      background: #fff;
      border-left: 4px solid #4a7c59;
      padding: 1rem 1.25rem;
      border-radius: 0 8px 8px 0;
      color: #444;
      font-size: .9rem;
      margin-bottom: 2rem;
    }

    /* Sezione */
    .sezione {
      margin-bottom: 2rem;
    }
    .sezione-titolo {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #888;
      border-bottom: 2px solid #e0e0d8;
      padding-bottom: .4rem;
      margin-bottom: 1.25rem;
    }

    /* Domanda */
    .domanda {
      background: #fff;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .domanda-testo {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 1rem;
      color: #1a1a1a;
    }
    .domanda-numero {
      display: inline-block;
      background: #4a7c59;
      color: #fff;
      font-size: .7rem;
      font-weight: 700;
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 50%;
      text-align: center;
      line-height: 1.5rem;
      margin-right: .5rem;
      flex-shrink: 0;
    }

    /* Radio e checkbox */
    .opzioni { display: flex; flex-direction: column; gap: .5rem; }
    .opzione {
      display: flex;
      align-items: flex-start;
      gap: .6rem;
      padding: .55rem .75rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s;
    }
    .opzione:hover { background: #f0f5f2; }
    .opzione input[type="radio"] {
      margin-top: .2rem;
      accent-color: #4a7c59;
      flex-shrink: 0;
    }
    .opzione label { cursor: pointer; font-size: .95rem; color: #333; }

    /* Textarea e input */
    textarea, input[type="text"], input[type="email"] {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      padding: .65rem .85rem;
      font-size: .95rem;
      font-family: inherit;
      color: #2a2a2a;
      transition: border-color .2s;
      background: #fafaf8;
    }
    textarea:focus, input[type="text"]:focus, input[type="email"]:focus {
      outline: none;
      border-color: #4a7c59;
      background: #fff;
    }
    textarea { resize: vertical; }

    /* Errori */
    .errori { color: #c0392b; font-size: .85rem; margin-top: .4rem; }
    .domanda.has-error { border-left: 3px solid #c0392b; }

    /* Pulsante */
    .btn-invia {
      display: block;
      width: 100%;
      padding: 1rem;
      background: #4a7c59;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      margin-top: 1.5rem;
    }
    .btn-invia:hover { background: #3a6347; }
    .btn-invia:disabled { background: #aaa; cursor: not-allowed; }

    /* Indicatore caricamento HTMX */
    .htmx-indicator {
      display: none;
      text-align: center;
      color: #666;
      font-size: .9rem;
      padding: .5rem;
    }
    .htmx-request .htmx-indicator { display: block; }
    .htmx-request .btn-invia { display: none; }

    /* Thank you */
    .grazie-box {
      text-align: center;
      padding: 3rem 2rem;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .grazie-box .check { font-size: 3.5rem; margin-bottom: 1rem; }
    .grazie-box h2 { font-size: 1.5rem; margin-bottom: .5rem; color: #4a7c59; }
    .grazie-box p { color: #555; }

    /* Dashboard */
    .stat-card {
      background: #fff;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .stat-card h3 { font-size: .9rem; font-weight: 600; color: #444; margin-bottom: .85rem; }
    .bar-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: .45rem;
      font-size: .85rem;
    }
    .bar-label { width: 260px; flex-shrink: 0; color: #333; }
    .bar-track { flex: 1; background: #eee; border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-fill { height: 100%; background: #4a7c59; border-radius: 4px; transition: width .4s; }
    .bar-n { color: #888; min-width: 40px; text-align: right; }
    .totale-badge {
      display: inline-block;
      background: #4a7c59;
      color: #fff;
      padding: .3rem .8rem;
      border-radius: 20px;
      font-size: .85rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    .note-item {
      padding: .6rem 0;
      border-bottom: 1px solid #eee;
      font-size: .9rem;
      color: #444;
    }

    @media (max-width: 480px) {
      .bar-label { width: 160px; }
    }
  </style>
</head>
<body>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
